name: BuildCommit Auto Build

on:
  push:
    tags:
      - "build/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: buildcommit-auto-build-${{ github.ref }}
  cancel-in-progress: false

# Runner-local settings. Unity project paths are resolved from BuildRequest.unityProjectPath.
env:
  UNITY_HUB_EDITOR_ROOT: "/Applications/Unity/Hub/Editor"
  DEVELOPER_DIR: "/Applications/Xcode.app/Contents/Developer"
  CI_SECRET_ROOT: "/Users/lydia/workspace/build-automation"
  IOS_DISTRIBUTION_SIGNING_IDENTITY: "Apple Distribution"
  BUILD_CLEANUP_RETENTION_DAYS: 5

jobs:
  allocate:
    name: Allocate Project Affinity Runner
    runs-on: ubuntu-latest
    outputs:
      affinity_label: ${{ steps.allocator.outputs.affinity_label }}
      runner_id: ${{ steps.allocator.outputs.runner_id }}
      runner_name: ${{ steps.allocator.outputs.runner_name }}
      allocation_mode: ${{ steps.allocator.outputs.allocation_mode }}
    steps:
      - name: Load allocator source without checkout
        id: allocator_source
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require("fs");
            const path = require("path");
            const source = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: ".github/scripts/allocate-unity-mobile-runner.js",
              ref: context.sha
            });
            if (Array.isArray(source.data) || source.data.type !== "file" || !source.data.content) {
              throw new Error("Allocator source was not returned as a repository file.");
            }
            const allocatorPath = path.join(process.env.RUNNER_TEMP, "allocate-unity-mobile-runner.js");
            fs.writeFileSync(allocatorPath, Buffer.from(source.data.content, "base64"), { mode: 0o600 });
            core.setOutput("path", allocatorPath);

      - name: Validate allocator credential
        shell: bash
        env:
          UNITY_RUNNER_ALLOCATOR_TOKEN: ${{ secrets.UNITY_RUNNER_ALLOCATOR_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$UNITY_RUNNER_ALLOCATOR_TOKEN" ]; then
            echo "::error::UNITY_RUNNER_ALLOCATOR_TOKEN is required and must have organization Self-hosted runners: write permission."
            exit 1
          fi

      - name: Resolve or allocate project runner
        id: allocator
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          CONFIGURED_AFFINITY_LABEL: ${{ vars.UNITY_RUNNER_AFFINITY_LABEL }}
          ALLOCATOR_SCRIPT_PATH: ${{ steps.allocator_source.outputs.path }}
        with:
          github-token: ${{ secrets.UNITY_RUNNER_ALLOCATOR_TOKEN }}
          script: |
            const allocator = require(process.env.ALLOCATOR_SCRIPT_PATH);
            await allocator.allocate({
              github,
              context,
              core,
              configuredLabel: process.env.CONFIGURED_AFFINITY_LABEL
            });

  mobile-build:
    name: Mobile Build & Deploy
    needs: allocate
    runs-on:
      - self-hosted
      - macOS
      - unity-mobile
      - ${{ needs.allocate.outputs.affinity_label }}
    steps:
      - name: Reset tracked state while preserving Unity cache
        shell: bash
        run: |
          set -euo pipefail
          if git -C "$GITHUB_WORKSPACE" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            git -C "$GITHUB_WORKSPACE" reset --hard
            git -C "$GITHUB_WORKSPACE" clean -ffd
          fi

      - name: Checkout without deleting ignored Unity cache
        uses: actions/checkout@v4
        with:
          clean: false
          persist-credentials: false
          lfs: true

      - name: Resolve Unity project
        id: paths
        shell: bash
        run: bash "$GITHUB_WORKSPACE/.github/scripts/resolve-unity-project.sh"

      - name: Detect BuildCommit request
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_DELETED: ${{ github.event.deleted }}
        run: |
          ruby <<'RUBY'
          require "json"

          event_name = ENV.fetch("EVENT_NAME", "")
          ref_type = ENV.fetch("REF_TYPE", "")
          ref_name = ENV.fetch("REF_NAME", "")
          deleted = ENV.fetch("EVENT_DELETED", "false") == "true"
          request_path = ENV.fetch("BUILD_REQUEST_PATH")

          tag_request = event_name == "push" &&
                        ref_type == "tag" &&
                        ref_name.start_with?("build/") &&
                        !deleted
          manual_request = event_name == "workflow_dispatch"
          should_build = tag_request || manual_request
          platform = ""
          build_kind = ""
          upload_target = ""
          distribution_profile = "Actionfit"
          android_package_name = ""
          ios_bundle_id = ""
          build_version = ""
          bundle_no = ""
          slack_mentions = ""

          if should_build && File.exist?(request_path)
            request = JSON.parse(File.read(request_path))
            should_build = request["triggerSource"] == "BuildCommit"
            platform = {
              "-1" => "None",
              "0" => "Current",
              "1" => "Android",
              "2" => "iOS",
              "3" => "Both"
            }.fetch(request["platform"].to_s, request["platform"].to_s)
            build_kind = {
              "0" => "Default",
              "1" => "AndroidApk",
              "2" => "AndroidAab",
              "3" => "iOSXcodeProject",
              "4" => "AndroidAabAndiOSXcodeProject"
            }.fetch(request["buildKind"].to_s, request["buildKind"].to_s)
            upload_target = {
              "0" => "None",
              "1" => "GooglePlayInternal",
              "2" => "TestFlight",
              "3" => "GooglePlayInternalAndTestFlight"
            }.fetch(request["uploadTarget"].to_s, request["uploadTarget"].to_s)
            distribution_profile = {
              "0" => "Actionfit",
              "1" => "Stormborn"
            }.fetch(request["distributionProfile"].to_s, request["distributionProfile"].to_s)
            distribution_profile = "Actionfit" if distribution_profile.empty?
            android_package_name = request["androidPackageName"].to_s.strip
            ios_bundle_id = request["iosBundleId"].to_s.strip
            build_version = request["buildVersion"].to_s.strip
            bundle_no = request["bundleNo"].to_s.strip
            raw_slack_mentions = request["slackMentions"]
            slack_mentions = case raw_slack_mentions
                             when Array
                               raw_slack_mentions.map(&:to_s).join(" ")
                             else
                               raw_slack_mentions.to_s
                             end.strip.gsub(/[,\s]+/, " ")
            should_build = false if platform == "None"
          else
            should_build = false
          end

          outputs = {
            "should_build" => should_build,
            "platform" => platform,
            "build_kind" => build_kind,
            "upload_target" => upload_target,
            "distribution_profile" => distribution_profile,
            "android_package_name" => android_package_name,
            "ios_bundle_id" => ios_bundle_id,
            "build_version" => build_version,
            "bundle_no" => bundle_no,
            "slack_mentions" => slack_mentions
          }
          outputs.each do |name, value|
            abort("BuildRequest field for #{name} contains control characters") if value.to_s.match?(/[[:cntrl:]]/)
          end

          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |output|
            outputs.each { |name, value| output.puts("#{name}=#{value}") }
          end
          RUBY

      - name: Prepare private package access
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: bash "$REPOSITORY_ROOT/.github/scripts/prepare-actionfit-private-package-access.sh"

      - name: Ensure Unity editor and Android modules
        if: steps.detect.outputs.should_build == 'true' && (steps.detect.outputs.platform == 'Android' || steps.detect.outputs.platform == 'Both')
        shell: bash
        env:
          BUILD_PLATFORM: AOS
          BUILD_PROJECT_NAME: ${{ steps.paths.outputs.unity_project_name }}
          BUILD_VERSION: ${{ steps.detect.outputs.build_version }}
          BUILD_BUNDLE_NO: ${{ steps.detect.outputs.bundle_no }}
          SLACK_BUILD_MENTIONS: ${{ steps.detect.outputs.slack_mentions }}
          BUILD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash "$REPOSITORY_ROOT/.github/scripts/ensure-unity-editor-modules.sh" Android

      - name: Ensure Unity editor and iOS modules
        if: steps.detect.outputs.should_build == 'true' && (steps.detect.outputs.platform == 'iOS' || steps.detect.outputs.platform == 'Both')
        shell: bash
        env:
          BUILD_PLATFORM: iOS
          BUILD_PROJECT_NAME: ${{ steps.paths.outputs.unity_project_name }}
          BUILD_VERSION: ${{ steps.detect.outputs.build_version }}
          BUILD_BUNDLE_NO: ${{ steps.detect.outputs.bundle_no }}
          SLACK_BUILD_MENTIONS: ${{ steps.detect.outputs.slack_mentions }}
          BUILD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash "$REPOSITORY_ROOT/.github/scripts/ensure-unity-editor-modules.sh" iOS

      - name: Resolve Unity editor
        id: unity
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: bash "$REPOSITORY_ROOT/.github/scripts/resolve-unity-editor.sh"

      - name: Check runner-local Unity Library
        id: local_library
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: |
          if [ -f "$UNITY_LIBRARY_DIR/SourceAssetDB" ]; then
            echo "restore=false" >> "$GITHUB_OUTPUT"
            echo "Using runner-local Unity Library: $UNITY_LIBRARY_DIR"
          else
            echo "restore=true" >> "$GITHUB_OUTPUT"
            echo "Runner-local Unity Library is cold; trying remote cache fallback."
          fi

      - name: Restore Android Unity Library cold cache
        if: steps.local_library.outputs.restore == 'true' && steps.detect.outputs.platform == 'Android'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.paths.outputs.unity_library_dir }}
          key: Library-${{ steps.paths.outputs.unity_project_key }}-macOS-Android-${{ steps.unity.outputs.unity_version }}-${{ steps.paths.outputs.unity_cache_input_hash }}
          restore-keys: |
            Library-${{ steps.paths.outputs.unity_project_key }}-macOS-Android-${{ steps.unity.outputs.unity_version }}-

      - name: Restore iOS Unity Library cold cache
        if: steps.local_library.outputs.restore == 'true' && steps.detect.outputs.platform == 'iOS'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.paths.outputs.unity_library_dir }}
          key: Library-${{ steps.paths.outputs.unity_project_key }}-macOS-iOS-${{ steps.unity.outputs.unity_version }}-${{ steps.paths.outputs.unity_cache_input_hash }}
          restore-keys: |
            Library-${{ steps.paths.outputs.unity_project_key }}-macOS-iOS-${{ steps.unity.outputs.unity_version }}-

      - name: Restore latest mobile Unity Library cold cache
        if: steps.local_library.outputs.restore == 'true' && (steps.detect.outputs.platform == 'Both' || steps.detect.outputs.platform == 'Current')
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.paths.outputs.unity_library_dir }}
          key: Library-${{ steps.paths.outputs.unity_project_key }}-macOS-Affinity-${{ steps.unity.outputs.unity_version }}-${{ steps.paths.outputs.unity_cache_input_hash }}
          restore-keys: |
            Library-${{ steps.paths.outputs.unity_project_key }}-macOS-

      - name: Prepare build sequence and first target
        id: sequence
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$UNITY_LOG_DIR"
          unity_status=0
          BUILD_SEQUENCE_OUTPUT_PATH="$GITHUB_OUTPUT" \
            "$UNITY_EXECUTABLE" \
              -batchmode \
              -quit \
              -projectPath "$UNITY_PROJECT_DIR" \
              -executeMethod ActionFit.BuildAutomation.Editor.CIBuildEntry.PrepareBuildSequence \
              -logFile "$UNITY_LOG_DIR/unity-build-sequence.log" || unity_status=$?

          if [ "$unity_status" -ne 0 ]; then
            echo "::group::Unity build sequence log tail"
            tail -n 400 "$UNITY_LOG_DIR/unity-build-sequence.log" || true
            echo "::endgroup::"
            exit "$unity_status"
          fi

      - name: Build Android first
        id: android_first
        if: steps.sequence.outputs.first == 'Android'
        continue-on-error: true
        uses: ./.github/actions/build-android
        with:
          request-path: ${{ steps.sequence.outputs.android_request_path }}
          prepare-target: "false"
          upload-target: ${{ steps.detect.outputs.upload_target }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          android-package-name: ${{ steps.detect.outputs.android_package_name }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.detect.outputs.bundle_no }}
          slack-mentions: ${{ steps.detect.outputs.slack_mentions }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Build iOS first
        id: ios_first
        if: steps.sequence.outputs.first == 'iOS'
        continue-on-error: true
        uses: ./.github/actions/build-ios
        with:
          request-path: ${{ steps.sequence.outputs.ios_request_path }}
          prepare-target: "false"
          upload-target: ${{ steps.detect.outputs.upload_target }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.detect.outputs.bundle_no }}
          slack-mentions: ${{ steps.detect.outputs.slack_mentions }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Build Android second
        id: android_second
        if: always() && steps.sequence.outputs.second == 'Android'
        continue-on-error: true
        uses: ./.github/actions/build-android
        with:
          request-path: ${{ steps.sequence.outputs.android_request_path }}
          prepare-target: "true"
          upload-target: ${{ steps.detect.outputs.upload_target }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          android-package-name: ${{ steps.detect.outputs.android_package_name }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.detect.outputs.bundle_no }}
          slack-mentions: ${{ steps.detect.outputs.slack_mentions }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Build iOS second
        id: ios_second
        if: always() && steps.sequence.outputs.second == 'iOS'
        continue-on-error: true
        uses: ./.github/actions/build-ios
        with:
          request-path: ${{ steps.sequence.outputs.ios_request_path }}
          prepare-target: "true"
          upload-target: ${{ steps.detect.outputs.upload_target }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.detect.outputs.bundle_no }}
          slack-mentions: ${{ steps.detect.outputs.slack_mentions }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Final cleanup while preserving Unity Library
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${REPOSITORY_ROOT:-}" ]; then
            find "$REPOSITORY_ROOT/.build/ci" -maxdepth 1 -type f -name 'build_request_*.json' -delete 2>/dev/null || true
            rmdir "$REPOSITORY_ROOT/.build/ci" 2>/dev/null || true
          fi
          if [ -n "${UNITY_PROJECT_DIR:-}" ]; then
            find "$UNITY_PROJECT_DIR/.build/ci-keystore" -maxdepth 1 -type f -delete 2>/dev/null || true
            rmdir "$UNITY_PROJECT_DIR/.build/ci-keystore" 2>/dev/null || true
          fi
          rm -f \
            "${RUNNER_TEMP:-/tmp}/buildcommit-android-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.marker" \
            "${RUNNER_TEMP:-/tmp}/app_store_connect_api_key.json" \
            "${RUNNER_TEMP:-/tmp}/ios-app-store-profile.plist" \
            "${RUNNER_TEMP:-/tmp}/ios-previous-default-keychain.txt" \
            "${RUNNER_TEMP:-/tmp}/ios-previous-keychains.txt"

      - name: Fail when a requested platform failed
        if: always() && steps.detect.outputs.should_build == 'true'
        shell: bash
        env:
          SEQUENCE_OUTCOME: ${{ steps.sequence.outcome }}
          ANDROID_FIRST_OUTCOME: ${{ steps.android_first.outcome }}
          IOS_FIRST_OUTCOME: ${{ steps.ios_first.outcome }}
          ANDROID_SECOND_OUTCOME: ${{ steps.android_second.outcome }}
          IOS_SECOND_OUTCOME: ${{ steps.ios_second.outcome }}
        run: |
          set -euo pipefail
          failed=false
          for outcome in \
            "$SEQUENCE_OUTCOME" \
            "$ANDROID_FIRST_OUTCOME" \
            "$IOS_FIRST_OUTCOME" \
            "$ANDROID_SECOND_OUTCOME" \
            "$IOS_SECOND_OUTCOME"; do
            if [ "$outcome" = "failure" ]; then
              failed=true
            fi
          done

          if [ "$failed" = true ]; then
            echo "::error::One or more requested mobile build phases failed."
            exit 1
          fi
