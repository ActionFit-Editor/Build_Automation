name: Build Android from BuildCommit request
description: Build and optionally deploy Android on the prepared affinity runner workspace.

inputs:
  request-path:
    description: Absolute path to the Android working BuildRequest.
    required: true
  prepare-target:
    description: Run the Unity target switch before building.
    required: false
    default: "false"
  defer-store-upload:
    description: Start the Store upload in the background so the next platform can build.
    required: false
    default: "false"
  upload-target:
    description: BuildRequest upload target.
    required: true
  development-build:
    description: Whether this phase is a Development Build.
    required: false
    default: "false"
  distribution-profile:
    description: Local runner distribution profile.
    required: true
  android-package-name:
    description: Google Play package name from the original BuildRequest.
    required: false
    default: ""
  ios-bundle-id:
    description: iOS bundle ID used while resolving the shared local secret bundle.
    required: false
    default: ""
  build-version:
    description: Build version used in store validation and cleanup metadata.
    required: false
    default: ""
  bundle-no:
    description: Bundle number used in store validation and cleanup metadata.
    required: false
    default: ""
  project-name:
    description: Resolved Unity project name.
    required: true

outputs:
  development-apk-path:
    description: Fresh Development APK produced by this build phase.
    value: ${{ steps.apk.outputs.path }}
  store-upload-deferred:
    description: Whether the Google Play upload was delegated to the background worker.
    value: ${{ steps.upload_mode.outputs.deferred }}
  store-binary-path:
    description: Fresh AAB staged by this build phase.
    value: ${{ steps.aab.outputs.path }}
  store-debug-symbols-path:
    description: Fresh Android native debug symbols staged by this build phase.
    value: ${{ steps.aab.outputs.debug_symbols_path }}
  store-mapping-path:
    description: Fresh Android mapping file staged by this build phase.
    value: ${{ steps.aab.outputs.mapping_path }}

runs:
  using: composite
  steps:
    - name: Mark Android build start
      id: build_timer
      shell: bash
      run: |
        marker_path="$RUNNER_TEMP/buildcommit-android-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.marker"
        rm -f "$marker_path"
        touch "$marker_path"
        echo "marker_path=$marker_path" >> "$GITHUB_OUTPUT"

    - name: Resolve Android store upload mode
      id: upload_mode
      shell: bash
      env:
        DEFER_STORE_UPLOAD: ${{ inputs.defer-store-upload }}
        REQUEST_UPLOAD_TARGET: ${{ inputs.upload-target }}
        DEVELOPMENT_BUILD: ${{ inputs.development-build }}
      run: |
        set -euo pipefail
        case "$DEFER_STORE_UPLOAD" in
          true|false) ;;
          *)
            echo "::error::defer-store-upload must be true or false: $DEFER_STORE_UPLOAD"
            exit 1
            ;;
        esac
        case "$DEVELOPMENT_BUILD" in
          true|false) ;;
          *)
            echo "::error::development-build must be true or false: $DEVELOPMENT_BUILD"
            exit 1
            ;;
        esac

        deferred=false
        case "$REQUEST_UPLOAD_TARGET" in
          GooglePlayInternal|GooglePlayInternalAndTestFlight)
            if [ "$DEFER_STORE_UPLOAD" = true ]; then
              deferred=true
            fi
            ;;
        esac
        echo "deferred=$deferred" >> "$GITHUB_OUTPUT"

    - name: Prepare Android transient output
      shell: bash
      run: rm -rf "$ANDROID_UPLOAD_DIR"

    - name: Resolve Android local runner secrets
      id: local_secrets
      shell: bash
      env:
        BUILD_REQUEST_PATH: ${{ inputs.request-path }}
        DISTRIBUTION_PROFILE: ${{ inputs.distribution-profile }}
        IOS_BUNDLE_ID_FROM_REQUEST: ${{ inputs.ios-bundle-id }}
        REQUEST_UPLOAD_TARGET: ${{ inputs.upload-target }}
      run: |
        set -euo pipefail
        case "$REQUEST_UPLOAD_TARGET" in
          GooglePlayInternal|GooglePlayInternalAndTestFlight)
            platform_upload_target=GooglePlayInternal
            ;;
          *)
            platform_upload_target=None
            ;;
        esac
        bash "$REPOSITORY_ROOT/.github/scripts/validate-local-runner-secrets.sh" \
          "$DISTRIBUTION_PROFILE" \
          Android \
          "$platform_upload_target"

    - name: Prepare Android target and build symbols
      if: inputs.prepare-target == 'true'
      shell: bash
      env:
        BUILD_REQUEST_PATH: ${{ inputs.request-path }}
      run: |
        set -euo pipefail
        mkdir -p "$UNITY_LOG_DIR"

        unity_status=0
        "$UNITY_EXECUTABLE" \
          -batchmode \
          -quit \
          -projectPath "$UNITY_PROJECT_DIR" \
          -buildTarget Android \
          -executeMethod ActionFit.BuildAutomation.Editor.CIBuildEntry.SwitchToRequestBuildTarget \
          -logFile "$UNITY_LOG_DIR/unity-android-switch.log" || unity_status=$?

        if [ "$unity_status" -ne 0 ]; then
          echo "::group::Unity Android target switch log tail"
          tail -n 400 "$UNITY_LOG_DIR/unity-android-switch.log" || true
          echo "::endgroup::"
          exit "$unity_status"
        fi

    - name: Build signed Android from BuildCommit request
      shell: bash
      env:
        BUILD_REQUEST_PATH: ${{ inputs.request-path }}
      run: |
        set -euo pipefail
        mkdir -p "$UNITY_LOG_DIR"

        unity_status=0
        "$UNITY_EXECUTABLE" \
          -batchmode \
          -quit \
          -projectPath "$UNITY_PROJECT_DIR" \
          -buildTarget Android \
          -executeMethod ActionFit.BuildAutomation.Editor.CIBuildEntry.BuildFromRequest \
          -logFile "$UNITY_LOG_DIR/unity-android.log" || unity_status=$?

        if [ "$unity_status" -ne 0 ]; then
          echo "::group::Unity Android log tail"
          tail -n 400 "$UNITY_LOG_DIR/unity-android.log" || true
          echo "::endgroup::"
          exit "$unity_status"
        fi

    - name: Locate AAB for upload
      id: aab
      if: inputs.development-build != 'true'
      shell: bash
      env:
        REQUEST_UPLOAD_TARGET: ${{ inputs.upload-target }}
      run: |
        set -euo pipefail
        marker_path="${{ steps.build_timer.outputs.marker_path }}"
        aab_path="$(find "$UNITY_BUILD_DIR" -name '*.aab' -newer "$marker_path" -print -quit)"
        if [ -z "$aab_path" ]; then
          case "$REQUEST_UPLOAD_TARGET" in
            GooglePlayInternal|GooglePlayInternalAndTestFlight)
              echo "::error::No fresh .aab found under $UNITY_BUILD_DIR. Google Play upload requires an AAB build."
              exit 1
              ;;
            *)
              echo "path=" >> "$GITHUB_OUTPUT"
              echo "debug_symbols_path=" >> "$GITHUB_OUTPUT"
              echo "mapping_path=" >> "$GITHUB_OUTPUT"
              echo "::warning::No fresh Android AAB was produced for recovery artifact staging."
              exit 0
              ;;
          esac
        fi
        upload_dir="$ANDROID_UPLOAD_DIR"
        upload_path="$upload_dir/upload.aab"
        mkdir -p "$upload_dir"
        cp "$aab_path" "$upload_path"
        echo "path=$upload_path" >> "$GITHUB_OUTPUT"

        aab_dir="$(dirname "$aab_path")"
        debug_symbols_path="$(find "$aab_dir" -maxdepth 1 -type f -newer "$marker_path" \( -iname '*symbols*.zip' -o -iname '*symbol*.zip' \) -print -quit)"
        if [ -z "$debug_symbols_path" ]; then
          debug_symbols_path="$(find "$UNITY_LIBRARY_DIR/Bee/Android/Prj/IL2CPP/Gradle/launcher/build/outputs/native-debug-symbols" -name '*.zip' -newer "$marker_path" -print -quit 2>/dev/null || true)"
        fi

        if [ -n "$debug_symbols_path" ]; then
          debug_symbols_upload_path="$upload_dir/native-debug-symbols.zip"
          cp "$debug_symbols_path" "$debug_symbols_upload_path"
          echo "debug_symbols_path=$debug_symbols_upload_path" >> "$GITHUB_OUTPUT"
        else
          echo "debug_symbols_path=" >> "$GITHUB_OUTPUT"
          echo "::warning::No Android debug symbols zip found."
        fi

        mapping_entry="BUNDLE-METADATA/com.android.tools.build.obfuscation/proguard.map"
        mapping_upload_path="$upload_dir/mapping.txt"
        aab_entries_path="$upload_dir/aab-entries.txt"
        if ! /usr/bin/unzip -Z1 "$upload_path" > "$aab_entries_path"; then
          rm -f "$aab_entries_path" "$mapping_upload_path"
          echo "::error::Unable to inspect the staged Android AAB for its Retrace mapping."
          exit 1
        fi

        if grep -Fxq "$mapping_entry" "$aab_entries_path"; then
          rm -f "$aab_entries_path"
          if ! /usr/bin/unzip -p "$upload_path" "$mapping_entry" > "$mapping_upload_path"; then
            rm -f "$mapping_upload_path"
            echo "::error::Unable to extract the Retrace mapping from the staged Android AAB."
            exit 1
          fi
          if [ ! -s "$mapping_upload_path" ]; then
            rm -f "$mapping_upload_path"
            echo "::error::The Retrace mapping extracted from the staged Android AAB is empty."
            exit 1
          fi
          echo "mapping_path=$mapping_upload_path" >> "$GITHUB_OUTPUT"
        else
          rm -f "$aab_entries_path" "$mapping_upload_path"
          if grep -Eq '^[[:space:]]*AndroidMinifyRelease:[[:space:]]*1([[:space:]]|$)' "$UNITY_PROJECT_DIR/ProjectSettings/ProjectSettings.asset"; then
            echo "::error::Android release minification is enabled, but the staged AAB does not contain $mapping_entry."
            exit 1
          fi
          echo "mapping_path=" >> "$GITHUB_OUTPUT"
          echo "Android release minification is disabled; no Retrace mapping is required."
        fi

    - name: Locate Development APK
      id: apk
      if: inputs.development-build == 'true'
      shell: bash
      run: |
        set -euo pipefail
        apk_path="$(find "$UNITY_BUILD_DIR" -type f -name '*.apk' -newer "${{ steps.build_timer.outputs.marker_path }}" -print -quit)"
        if [ -z "$apk_path" ]; then
          echo "::error::No fresh Development APK found under $UNITY_BUILD_DIR."
          exit 1
        fi
        echo "path=$apk_path" >> "$GITHUB_OUTPUT"

    - name: Prepare Google Play profile config
      id: google_play_config
      if: inputs.upload-target == 'GooglePlayInternal' || inputs.upload-target == 'GooglePlayInternalAndTestFlight'
      shell: bash
      env:
        ANDROID_PACKAGE_NAME: ${{ inputs.android-package-name }}
      run: |
        set -euo pipefail
        if [ -z "${ANDROID_PACKAGE_NAME:-}" ]; then
          echo "::error::Missing Google Play package name from BuildCommit request androidPackageName"
          exit 1
        fi

        test -r "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH" || {
          echo "::error::Google Play service account JSON is not readable: $GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH"
          exit 1
        }
        echo "service_account_json_path=$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH" >> "$GITHUB_OUTPUT"

    - name: Upload to Google Play internal track
      id: google_play_upload
      if: steps.upload_mode.outputs.deferred != 'true' && (inputs.upload-target == 'GooglePlayInternal' || inputs.upload-target == 'GooglePlayInternalAndTestFlight')
      uses: r0adkll/upload-google-play@v1
      with:
        serviceAccountJson: ${{ steps.google_play_config.outputs.service_account_json_path }}
        packageName: ${{ inputs.android-package-name }}
        releaseFiles: ${{ steps.aab.outputs.path }}
        mappingFile: ${{ steps.aab.outputs.mapping_path }}
        debugSymbols: ${{ steps.aab.outputs.debug_symbols_path }}
        tracks: internal
        status: completed

    - name: Start Google Play upload in background
      if: steps.upload_mode.outputs.deferred == 'true'
      shell: bash
      env:
        ANDROID_PACKAGE_NAME: ${{ inputs.android-package-name }}
        ANDROID_AAB_PATH: ${{ steps.aab.outputs.path }}
        ANDROID_MAPPING_PATH: ${{ steps.aab.outputs.mapping_path }}
        ANDROID_DEBUG_SYMBOLS_PATH: ${{ steps.aab.outputs.debug_symbols_path }}
        GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH: ${{ steps.google_play_config.outputs.service_account_json_path }}
      run: |
        set -euo pipefail
        /usr/bin/ruby "$REPOSITORY_ROOT/.github/scripts/store-upload-worker.rb" \
          start android "${STORE_UPLOAD_TIMEOUT_SECONDS:-3600}" -- \
          /bin/bash "$REPOSITORY_ROOT/.github/scripts/upload-google-play.sh"

    - name: Upload Android AAB artifact
      if: >-
        always() &&
        inputs.development-build != 'true' &&
        steps.upload_mode.outputs.deferred != 'true' &&
        steps.aab.outputs.path != '' &&
        (
          (inputs.upload-target != 'GooglePlayInternal' && inputs.upload-target != 'GooglePlayInternalAndTestFlight') ||
          steps.google_play_upload.outcome != 'success'
        )
      uses: actions/upload-artifact@v4
      with:
        name: Android-BuildCommit-AAB
        path: |
          ${{ steps.aab.outputs.path }}
          ${{ steps.aab.outputs.debug_symbols_path }}
          ${{ steps.aab.outputs.mapping_path }}
        if-no-files-found: error
        compression-level: 0
        retention-days: 3

    - name: Cleanup old Android build artifacts
      if: success() && steps.upload_mode.outputs.deferred != 'true' && (inputs.upload-target == 'GooglePlayInternal' || inputs.upload-target == 'GooglePlayInternalAndTestFlight')
      continue-on-error: true
      shell: bash
      env:
        BUILD_CLEANUP_PROJECT_NAME: ${{ inputs.project-name }}
        BUILD_CLEANUP_BUILD_VERSION: ${{ inputs.build-version }}
        BUILD_CLEANUP_BUNDLE_NO: ${{ inputs.bundle-no }}
      run: |
        if [ ! -f "$REPOSITORY_ROOT/.github/scripts/cleanup-old-build-artifacts.sh" ]; then
          echo "::warning::Build cleanup script not found; skipping."
          exit 0
        fi

        bash "$REPOSITORY_ROOT/.github/scripts/cleanup-old-build-artifacts.sh"

    - name: Upload Android logs
      if: failure() && steps.upload_mode.outputs.deferred != 'true'
      continue-on-error: true
      uses: actions/upload-artifact@v4
      with:
        name: Android-BuildCommit-Logs
        path: ${{ env.UNITY_LOG_DIR }}/**
        if-no-files-found: warn
        retention-days: 7
