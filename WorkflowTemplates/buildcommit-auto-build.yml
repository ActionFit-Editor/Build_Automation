name: BuildCommit Auto Build

on:
  push:
    tags:
      - "build/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: buildcommit-auto-build-${{ github.ref }}
  cancel-in-progress: false

# Runner-local settings. Unity project paths are resolved from BuildRequest.unityProjectPath.
env:
  UNITY_HUB_EDITOR_ROOT: "/Applications/Unity/Hub/Editor"
  DEVELOPER_DIR: "/Applications/Xcode.app/Contents/Developer"
  IOS_DISTRIBUTION_SIGNING_IDENTITY: "Apple Distribution"
  BUILD_CLEANUP_RETENTION_DAYS: 5
  STORE_UPLOAD_TIMEOUT_SECONDS: 3600
  TESTFLIGHT_UPLOAD_ATTEMPTS: 2
  TESTFLIGHT_UPLOAD_ATTEMPT_TIMEOUT_SECONDS: 900
  TESTFLIGHT_UPLOAD_RETRY_DELAY_SECONDS: 10
  SLACK_API_TIMEOUT_SECONDS: 60
  SLACK_FILE_UPLOAD_TIMEOUT_SECONDS: 1800

jobs:
  allocate:
    name: Allocate Project Affinity Runner
    permissions: {}
    runs-on:
      group: mobile-build-allocator
      labels: runner-allocator
    timeout-minutes: 5
    outputs:
      affinity_label: ${{ steps.allocator.outputs.project_label }}
      runner_id: ${{ steps.allocator.outputs.runner_id }}
      runner_name: ${{ steps.allocator.outputs.runner_name }}
      allocation_reused: ${{ steps.allocator.outputs.reused }}
    steps:
      - name: Resolve or allocate project runner
        id: allocator
        shell: bash
        env:
          CONFIGURED_AFFINITY_LABEL: ${{ vars.UNITY_RUNNER_AFFINITY_LABEL }}
          ALLOCATOR_EXECUTABLE: /Users/lydia/workspace/runner-allocator/bin/allocate-project-runner
        run: |
          set -euo pipefail
          if [ ! -x "$ALLOCATOR_EXECUTABLE" ]; then
            echo "::error::Runner allocator is missing or not executable: $ALLOCATOR_EXECUTABLE"
            exit 1
          fi

          allocator_args=(
            --repository "$GITHUB_REPOSITORY"
            --github-output "$GITHUB_OUTPUT"
          )
          if [ -n "${CONFIGURED_AFFINITY_LABEL:-}" ]; then
            allocator_args+=(--project-label "$CONFIGURED_AFFINITY_LABEL")
          fi

          "$ALLOCATOR_EXECUTABLE" "${allocator_args[@]}"

  mobile-build:
    name: Mobile Build & Deploy
    needs: allocate
    timeout-minutes: 220
    runs-on:
      - self-hosted
      - macOS
      - unity-mobile
      - ${{ needs.allocate.outputs.affinity_label }}
    steps:
      - name: Refresh affinity workspace retention marker
        shell: bash
        env:
          AFFINITY_LABEL: ${{ needs.allocate.outputs.affinity_label }}
          ALLOCATED_RUNNER_NAME: ${{ needs.allocate.outputs.runner_name }}
        run: |
          set -euo pipefail
          /usr/bin/ruby <<'RUBY'
          require "fileutils"
          require "json"

          repository = ENV.fetch("GITHUB_REPOSITORY")
          affinity_label = ENV.fetch("AFFINITY_LABEL")
          allocated_runner = ENV.fetch("ALLOCATED_RUNNER_NAME")
          actual_runner = ENV.fetch("RUNNER_NAME")
          abort("Invalid repository for affinity marker") unless repository.match?(%r{\A[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+\z})
          abort("Invalid project affinity label") unless affinity_label.match?(/\Aproject-[a-z0-9](?:[a-z0-9-]{0,53}[a-z0-9])?\z/)
          abort("Allocated runner mismatch: expected #{allocated_runner}, got #{actual_runner}") unless actual_runner == allocated_runner

          marker_path = File.join(
            File.expand_path("..", ENV.fetch("GITHUB_WORKSPACE")),
            ".unity-mobile-affinity.json"
          )
          temporary_path = "#{marker_path}.tmp-#{Process.pid}"
          marker = {
            "schema_version" => 1,
            "repository" => repository,
            "project_label" => affinity_label,
            "runner_name" => actual_runner
          }

          begin
            File.open(temporary_path, File::WRONLY | File::CREAT | File::TRUNC, 0o600) do |file|
              file.write(JSON.pretty_generate(marker))
              file.write("\n")
              file.flush
              file.fsync
            end
            File.rename(temporary_path, marker_path)
          ensure
            FileUtils.rm_f(temporary_path)
          end
          RUBY

      - name: Reset tracked state while preserving Unity cache
        shell: bash
        run: |
          set -euo pipefail
          if git -C "$GITHUB_WORKSPACE" rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            git -C "$GITHUB_WORKSPACE" reset --hard
            git -C "$GITHUB_WORKSPACE" clean -ffd
          fi

      - name: Checkout without deleting ignored Unity cache
        uses: actions/checkout@v4
        with:
          clean: false
          persist-credentials: false
          lfs: true

      - name: Resolve Unity project
        id: paths
        shell: bash
        run: bash "$GITHUB_WORKSPACE/.github/scripts/resolve-unity-project.sh"

      - name: Detect BuildCommit request
        id: detect
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_DELETED: ${{ github.event.deleted }}
        run: |
          ruby <<'RUBY'
          require "json"

          event_name = ENV.fetch("EVENT_NAME", "")
          ref_type = ENV.fetch("REF_TYPE", "")
          ref_name = ENV.fetch("REF_NAME", "")
          deleted = ENV.fetch("EVENT_DELETED", "false") == "true"
          request_path = ENV.fetch("BUILD_REQUEST_PATH")

          tag_request = event_name == "push" &&
                        ref_type == "tag" &&
                        ref_name.start_with?("build/") &&
                        !deleted
          manual_request = event_name == "workflow_dispatch"
          should_build = tag_request || manual_request
          platform = ""
          build_kind = ""
          upload_target = ""
          distribution_profile = "Actionfit"
          android_package_name = ""
          ios_bundle_id = ""
          build_version = ""
          bundle_no = ""
          development_build = "false"
          slack_mentions = ""

          if should_build && File.exist?(request_path)
            request = JSON.parse(File.read(request_path))
            should_build = request["triggerSource"] == "BuildCommit"
            platform = {
              "-1" => "None",
              "0" => "Current",
              "1" => "Android",
              "2" => "iOS",
              "3" => "Both"
            }.fetch(request["platform"].to_s, request["platform"].to_s)
            build_kind = {
              "0" => "Default",
              "1" => "AndroidApk",
              "2" => "AndroidAab",
              "3" => "iOSXcodeProject",
              "4" => "AndroidAabAndiOSXcodeProject"
            }.fetch(request["buildKind"].to_s, request["buildKind"].to_s)
            upload_target = {
              "0" => "None",
              "1" => "GooglePlayInternal",
              "2" => "TestFlight",
              "3" => "GooglePlayInternalAndTestFlight"
            }.fetch(request["uploadTarget"].to_s, request["uploadTarget"].to_s)
            distribution_profile = {
              "0" => "Actionfit",
              "1" => "Stormborn"
            }.fetch(request["distributionProfile"].to_s, request["distributionProfile"].to_s)
            distribution_profile = "Actionfit" if distribution_profile.empty?
            android_package_name = request["androidPackageName"].to_s.strip
            ios_bundle_id = request["iosBundleId"].to_s.strip
            build_version = request["buildVersion"].to_s.strip
            bundle_no = request["bundleNo"].to_s.strip
            development_build = request["developmentBuild"] == true ? "true" : "false"
            raw_slack_mentions = request["slackMentions"]
            slack_mentions = case raw_slack_mentions
                             when Array
                               raw_slack_mentions.map(&:to_s)
                             else
                               raw_slack_mentions.to_s.split(/[,\s]+/)
                             end
                             .map(&:strip)
                             .select { |value| value.match?(/\A[UW][A-Z0-9]+\z/) }
                             .uniq
                             .join(" ")
            should_build = false if platform == "None"
          else
            should_build = false
          end

          outputs = {
            "should_build" => should_build,
            "platform" => platform,
            "build_kind" => build_kind,
            "upload_target" => upload_target,
            "distribution_profile" => distribution_profile,
            "android_package_name" => android_package_name,
            "ios_bundle_id" => ios_bundle_id,
            "build_version" => build_version,
            "bundle_no" => bundle_no,
            "development_build" => development_build,
            "slack_mentions" => slack_mentions
          }
          outputs.each do |name, value|
            abort("BuildRequest field for #{name} contains control characters") if value.to_s.match?(/[[:cntrl:]]/)
          end

          File.open(ENV.fetch("GITHUB_OUTPUT"), "a") do |output|
            outputs.each { |name, value| output.puts("#{name}=#{value}") }
          end
          RUBY

      - name: Resolve shared runner secret root
        id: secret_root
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: bash "$REPOSITORY_ROOT/.github/scripts/resolve-local-secret-root.sh"

      - name: Mark BuildCommit notification start
        id: workflow_timer
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: echo "started_at_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Notify Slack build start
        if: steps.detect.outputs.should_build == 'true'
        continue-on-error: true
        shell: bash
        env:
          BUILD_JOB_STATUS: start
          BUILD_PLATFORM: ${{ steps.detect.outputs.platform }}
          BUILD_PROJECT_NAME: ${{ steps.paths.outputs.unity_project_name }}
          BUILD_VERSION: ${{ steps.detect.outputs.build_version }}
          BUILD_BUNDLE_NO: ${{ steps.detect.outputs.bundle_no }}
          BUILD_DEVELOPMENT_BUILD: ${{ steps.detect.outputs.development_build }}
          BUILD_DISTRIBUTION_PROFILE: ${{ steps.detect.outputs.distribution_profile }}
          SLACK_BUILD_MENTIONS: ${{ steps.detect.outputs.slack_mentions }}
          BUILD_SHORT_SHA: ${{ github.sha }}
          BUILD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_STARTED_AT_EPOCH: ${{ steps.workflow_timer.outputs.started_at_epoch }}
        run: bash "$REPOSITORY_ROOT/.github/scripts/notify-slack-build-result.sh"

      - name: Reset current BuildCommit logs
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          expected_log_dir="$UNITY_PROJECT_DIR/Logs"
          if [ "$UNITY_LOG_DIR" != "$expected_log_dir" ]; then
            echo "::error::Refusing to reset an unexpected Unity log path: $UNITY_LOG_DIR"
            exit 1
          fi
          rm -rf "$UNITY_LOG_DIR"
          mkdir -p "$UNITY_LOG_DIR"

      - name: Prepare private package access
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: bash "$REPOSITORY_ROOT/.github/scripts/prepare-actionfit-private-package-access.sh"

      - name: Ensure Unity editor and Android modules
        if: steps.detect.outputs.should_build == 'true' && (steps.detect.outputs.platform == 'Android' || steps.detect.outputs.platform == 'Both')
        shell: bash
        run: bash "$REPOSITORY_ROOT/.github/scripts/ensure-unity-editor-modules.sh" Android

      - name: Ensure Unity editor and iOS modules
        if: steps.detect.outputs.should_build == 'true' && (steps.detect.outputs.platform == 'iOS' || steps.detect.outputs.platform == 'Both')
        shell: bash
        run: bash "$REPOSITORY_ROOT/.github/scripts/ensure-unity-editor-modules.sh" iOS

      - name: Resolve Unity editor
        id: unity
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: bash "$REPOSITORY_ROOT/.github/scripts/resolve-unity-editor.sh"

      - name: Check runner-local Unity Library
        id: local_library
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: |
          if [ -f "$UNITY_LIBRARY_DIR/SourceAssetDB" ]; then
            echo "restore=false" >> "$GITHUB_OUTPUT"
            echo "Using runner-local Unity Library: $UNITY_LIBRARY_DIR"
          else
            echo "restore=true" >> "$GITHUB_OUTPUT"
            echo "Runner-local Unity Library is cold; trying remote cache fallback."
          fi

      - name: Restore Android Unity Library cold cache
        if: steps.local_library.outputs.restore == 'true' && steps.detect.outputs.platform == 'Android'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.paths.outputs.unity_library_dir }}
          key: Library-${{ steps.paths.outputs.unity_project_key }}-macOS-Android-${{ steps.unity.outputs.unity_version }}-${{ steps.paths.outputs.unity_cache_input_hash }}
          restore-keys: |
            Library-${{ steps.paths.outputs.unity_project_key }}-macOS-Android-${{ steps.unity.outputs.unity_version }}-

      - name: Restore iOS Unity Library cold cache
        if: steps.local_library.outputs.restore == 'true' && steps.detect.outputs.platform == 'iOS'
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.paths.outputs.unity_library_dir }}
          key: Library-${{ steps.paths.outputs.unity_project_key }}-macOS-iOS-${{ steps.unity.outputs.unity_version }}-${{ steps.paths.outputs.unity_cache_input_hash }}
          restore-keys: |
            Library-${{ steps.paths.outputs.unity_project_key }}-macOS-iOS-${{ steps.unity.outputs.unity_version }}-

      - name: Restore latest mobile Unity Library cold cache
        if: steps.local_library.outputs.restore == 'true' && (steps.detect.outputs.platform == 'Both' || steps.detect.outputs.platform == 'Current')
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.paths.outputs.unity_library_dir }}
          key: Library-${{ steps.paths.outputs.unity_project_key }}-macOS-Affinity-${{ steps.unity.outputs.unity_version }}-${{ steps.paths.outputs.unity_cache_input_hash }}
          restore-keys: |
            Library-${{ steps.paths.outputs.unity_project_key }}-macOS-

      - name: Prepare build sequence and first target
        id: sequence
        if: steps.detect.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$UNITY_LOG_DIR"
          unity_status=0
          BUILD_SEQUENCE_OUTPUT_PATH="$GITHUB_OUTPUT" \
            "$UNITY_EXECUTABLE" \
              -batchmode \
              -quit \
              -projectPath "$UNITY_PROJECT_DIR" \
              -executeMethod ActionFit.BuildAutomation.Editor.CIBuildEntry.PrepareBuildSequence \
              -logFile "$UNITY_LOG_DIR/unity-build-sequence.log" || unity_status=$?

          if [ "$unity_status" -ne 0 ]; then
            echo "::group::Unity build sequence log tail"
            tail -n 400 "$UNITY_LOG_DIR/unity-build-sequence.log" || true
            echo "::endgroup::"
            exit "$unity_status"
          fi

      - name: Build Android first
        id: android_first
        if: steps.sequence.outputs.first == 'Android'
        continue-on-error: true
        uses: ./.github/actions/build-android
        with:
          request-path: ${{ steps.sequence.outputs.android_request_path }}
          prepare-target: "false"
          defer-store-upload: ${{ steps.sequence.outputs.second != '' }}
          upload-target: ${{ steps.sequence.outputs.android_upload_target }}
          development-build: ${{ steps.sequence.outputs.android_development_build }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          android-package-name: ${{ steps.detect.outputs.android_package_name }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.sequence.outputs.android_bundle_no }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Build iOS first
        id: ios_first
        if: steps.sequence.outputs.first == 'iOS'
        continue-on-error: true
        uses: ./.github/actions/build-ios
        with:
          request-path: ${{ steps.sequence.outputs.ios_request_path }}
          prepare-target: "false"
          defer-store-upload: ${{ steps.sequence.outputs.second != '' }}
          upload-target: ${{ steps.sequence.outputs.ios_upload_target }}
          development-build: ${{ steps.sequence.outputs.ios_development_build }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.sequence.outputs.ios_bundle_no }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Build Android second
        id: android_second
        if: always() && steps.sequence.outputs.second == 'Android'
        continue-on-error: true
        uses: ./.github/actions/build-android
        with:
          request-path: ${{ steps.sequence.outputs.android_request_path }}
          prepare-target: "true"
          defer-store-upload: "false"
          upload-target: ${{ steps.sequence.outputs.android_upload_target }}
          development-build: ${{ steps.sequence.outputs.android_development_build }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          android-package-name: ${{ steps.detect.outputs.android_package_name }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.sequence.outputs.android_bundle_no }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Build iOS second
        id: ios_second
        if: always() && steps.sequence.outputs.second == 'iOS'
        continue-on-error: true
        uses: ./.github/actions/build-ios
        with:
          request-path: ${{ steps.sequence.outputs.ios_request_path }}
          prepare-target: "true"
          defer-store-upload: "false"
          upload-target: ${{ steps.sequence.outputs.ios_upload_target }}
          development-build: ${{ steps.sequence.outputs.ios_development_build }}
          distribution-profile: ${{ steps.detect.outputs.distribution_profile }}
          ios-bundle-id: ${{ steps.detect.outputs.ios_bundle_id }}
          build-version: ${{ steps.detect.outputs.build_version }}
          bundle-no: ${{ steps.sequence.outputs.ios_bundle_no }}
          project-name: ${{ steps.paths.outputs.unity_project_name }}

      - name: Finalize deferred first store upload
        id: first_store_upload
        if: always() && steps.sequence.outputs.second != ''
        continue-on-error: true
        shell: bash
        env:
          ANDROID_UPLOAD_DEFERRED: ${{ steps.android_first.outputs.store-upload-deferred }}
          IOS_UPLOAD_DEFERRED: ${{ steps.ios_first.outputs.store-upload-deferred }}
        run: |
          set -euo pipefail
          task=""
          if [ "$ANDROID_UPLOAD_DEFERRED" = true ]; then
            task=android
          elif [ "$IOS_UPLOAD_DEFERRED" = true ]; then
            task=ios
          fi

          if [ -z "$task" ]; then
            echo "No deferred first-platform Store upload to finalize."
            exit 0
          fi

          /usr/bin/ruby "$REPOSITORY_ROOT/.github/scripts/store-upload-worker.rb" wait "$task"

      - name: Stop unfinished deferred store upload
        id: store_upload_cleanup
        if: always() && steps.sequence.outputs.second != ''
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/ruby "$REPOSITORY_ROOT/.github/scripts/store-upload-worker.rb" cancel android
          /usr/bin/ruby "$REPOSITORY_ROOT/.github/scripts/store-upload-worker.rb" cancel ios

      - name: Upload deferred Android AAB artifact
        if: always() && steps.android_first.outputs.store-upload-deferred == 'true' && steps.android_first.outputs.store-binary-path != '' && steps.first_store_upload.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: Android-BuildCommit-AAB
          path: |
            ${{ steps.android_first.outputs.store-binary-path }}
            ${{ steps.android_first.outputs.store-debug-symbols-path }}
            ${{ steps.android_first.outputs.store-mapping-path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 3

      - name: Upload deferred Android logs
        if: always() && steps.android_first.outputs.store-upload-deferred == 'true' && steps.first_store_upload.outcome != 'success'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: Android-BuildCommit-Logs
          path: ${{ env.UNITY_LOG_DIR }}/**
          if-no-files-found: warn
          retention-days: 7

      - name: Upload deferred iOS app artifact
        if: always() && steps.ios_first.outputs.store-upload-deferred == 'true' && steps.ios_first.outputs.store-binary-path != '' && steps.first_store_upload.outcome != 'success'
        uses: actions/upload-artifact@v4
        with:
          name: iOS-BuildCommit-App
          path: ${{ steps.ios_first.outputs.store-binary-path }}
          if-no-files-found: error
          compression-level: 0
          retention-days: 3

      - name: Upload deferred store upload diagnostics
        if: >-
          always() &&
          steps.first_store_upload.outcome != 'success' &&
          (steps.android_first.outputs.store-upload-deferred == 'true' || steps.ios_first.outputs.store-upload-deferred == 'true')
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: First-Store-Upload-Logs
          path: ${{ runner.temp }}/buildcommit-store-upload-${{ github.run_id }}-${{ github.run_attempt }}/**
          if-no-files-found: warn
          retention-days: 7

      - name: Cleanup old artifacts after deferred upload
        if: always() && steps.first_store_upload.outcome == 'success' && (steps.android_first.outputs.store-upload-deferred == 'true' || steps.ios_first.outputs.store-upload-deferred == 'true')
        continue-on-error: true
        shell: bash
        env:
          BUILD_CLEANUP_PROJECT_NAME: ${{ steps.paths.outputs.unity_project_name }}
          BUILD_CLEANUP_BUILD_VERSION: ${{ steps.detect.outputs.build_version }}
          BUILD_CLEANUP_BUNDLE_NO: ${{ steps.android_first.outputs.store-upload-deferred == 'true' && steps.sequence.outputs.android_bundle_no || steps.ios_first.outputs.effective-bundle-no }}
        run: bash "$REPOSITORY_ROOT/.github/scripts/cleanup-old-build-artifacts.sh"

      - name: Final cleanup while preserving Unity Library
        id: final_cleanup
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${REPOSITORY_ROOT:-}" ]; then
            find "$REPOSITORY_ROOT/.build/ci" -maxdepth 1 -type f -name 'build_request_*.json' -delete 2>/dev/null || true
            rmdir "$REPOSITORY_ROOT/.build/ci" 2>/dev/null || true
          fi
          if [ -n "${UNITY_PROJECT_DIR:-}" ]; then
            find "$UNITY_PROJECT_DIR/.build/ci-keystore" -maxdepth 1 -type f -delete 2>/dev/null || true
            rmdir "$UNITY_PROJECT_DIR/.build/ci-keystore" 2>/dev/null || true
          fi
          rm -f \
            "${RUNNER_TEMP:-/tmp}/buildcommit-android-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.marker" \
            "${RUNNER_TEMP:-/tmp}/app_store_connect_api_key.json" \
            "${RUNNER_TEMP:-/tmp}/ios-app-store-profile.plist" \
            "${RUNNER_TEMP:-/tmp}/ios-previous-default-keychain.txt" \
            "${RUNNER_TEMP:-/tmp}/ios-previous-keychains.txt"
          upload_state_root="${RUNNER_TEMP:-/tmp}/buildcommit-store-upload-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          rm -rf "$upload_state_root"

      - name: Fail when a requested platform failed
        id: build_result
        if: always() && steps.detect.outputs.should_build == 'true'
        shell: bash
        env:
          SEQUENCE_OUTCOME: ${{ steps.sequence.outcome }}
          ANDROID_FIRST_OUTCOME: ${{ steps.android_first.outcome }}
          IOS_FIRST_OUTCOME: ${{ steps.ios_first.outcome }}
          ANDROID_SECOND_OUTCOME: ${{ steps.android_second.outcome }}
          IOS_SECOND_OUTCOME: ${{ steps.ios_second.outcome }}
          FIRST_STORE_UPLOAD_OUTCOME: ${{ steps.first_store_upload.outcome }}
          STORE_UPLOAD_CLEANUP_OUTCOME: ${{ steps.store_upload_cleanup.outcome }}
        run: |
          set -euo pipefail
          failed=false
          for outcome in \
            "$SEQUENCE_OUTCOME" \
            "$ANDROID_FIRST_OUTCOME" \
            "$IOS_FIRST_OUTCOME" \
            "$ANDROID_SECOND_OUTCOME" \
            "$IOS_SECOND_OUTCOME" \
            "$FIRST_STORE_UPLOAD_OUTCOME" \
            "$STORE_UPLOAD_CLEANUP_OUTCOME"; do
            case "$outcome" in
              failure|cancelled) failed=true ;;
            esac
          done

          if [ "$failed" = true ]; then
            echo "::error::One or more requested mobile build phases failed."
            exit 1
          fi

      - name: Attach Development APK directly to Slack
        id: direct_apk_delivery
        if: >-
          always() &&
          steps.detect.outputs.should_build == 'true' &&
          steps.final_cleanup.outcome == 'success' &&
          steps.build_result.outcome == 'success' &&
          steps.sequence.outputs.android_development_build == 'true' &&
          steps.sequence.outcome == 'success' &&
          steps.android_first.outcome != 'failure' &&
          steps.ios_first.outcome != 'failure' &&
          steps.android_second.outcome != 'failure' &&
          steps.ios_second.outcome != 'failure' &&
          steps.first_store_upload.outcome != 'failure' &&
          steps.store_upload_cleanup.outcome != 'failure' &&
          (steps.android_first.outputs.development-apk-path != '' || steps.android_second.outputs.development-apk-path != '')
        continue-on-error: true
        shell: bash
        env:
          SLACK_FILE_PATH: ${{ steps.android_first.outputs.development-apk-path || steps.android_second.outputs.development-apk-path }}
          SLACK_UPLOAD_PHASE_PATH: ${{ runner.temp }}/buildcommit-slack-upload-${{ github.run_id }}-${{ github.run_attempt }}.phase
          BUILD_PLATFORM: ${{ steps.detect.outputs.platform }}
          BUILD_PROJECT_NAME: ${{ steps.paths.outputs.unity_project_name }}
          BUILD_VERSION: ${{ steps.detect.outputs.build_version }}
          BUILD_BUNDLE_NO: ${{ steps.sequence.outputs.android_bundle_no }}
          BUILD_IOS_EFFECTIVE_BUNDLE_NO: ${{ steps.ios_first.outputs.effective-bundle-no || steps.ios_second.outputs.effective-bundle-no }}
          SLACK_BUILD_MENTIONS: ${{ steps.detect.outputs.slack_mentions }}
          BUILD_SHORT_SHA: ${{ github.sha }}
          BUILD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: bash "$REPOSITORY_ROOT/.github/scripts/upload-slack-file.sh"

      - name: Notify Slack final result
        if: always() && steps.detect.outputs.should_build == 'true'
        continue-on-error: true
        shell: bash
        env:
          CURRENT_JOB_STATUS: ${{ job.status }}
          SEQUENCE_OUTCOME: ${{ steps.sequence.outcome }}
          ANDROID_FIRST_OUTCOME: ${{ steps.android_first.outcome }}
          IOS_FIRST_OUTCOME: ${{ steps.ios_first.outcome }}
          ANDROID_SECOND_OUTCOME: ${{ steps.android_second.outcome }}
          IOS_SECOND_OUTCOME: ${{ steps.ios_second.outcome }}
          FIRST_STORE_UPLOAD_OUTCOME: ${{ steps.first_store_upload.outcome }}
          STORE_UPLOAD_CLEANUP_OUTCOME: ${{ steps.store_upload_cleanup.outcome }}
          DIRECT_APK_DELIVERY_OUTCOME: ${{ steps.direct_apk_delivery.outcome }}
          DIRECT_APK_DELIVERY_PHASE_PATH: ${{ runner.temp }}/buildcommit-slack-upload-${{ github.run_id }}-${{ github.run_attempt }}.phase
          ANDROID_DEVELOPMENT_BUILD: ${{ steps.sequence.outputs.android_development_build }}
          ANDROID_BUNDLE_NO: ${{ steps.sequence.outputs.android_bundle_no }}
          BUILD_IOS_EFFECTIVE_BUNDLE_NO: ${{ steps.ios_first.outputs.effective-bundle-no || steps.ios_second.outputs.effective-bundle-no }}
          REQUEST_BUNDLE_NO: ${{ steps.detect.outputs.bundle_no }}
          BUILD_PLATFORM: ${{ steps.detect.outputs.platform }}
          BUILD_PROJECT_NAME: ${{ steps.paths.outputs.unity_project_name }}
          BUILD_VERSION: ${{ steps.detect.outputs.build_version }}
          BUILD_DEVELOPMENT_BUILD: ${{ steps.detect.outputs.development_build }}
          BUILD_DISTRIBUTION_PROFILE: ${{ steps.detect.outputs.distribution_profile }}
          SLACK_BUILD_MENTIONS: ${{ steps.detect.outputs.slack_mentions }}
          BUILD_SHORT_SHA: ${{ github.sha }}
          BUILD_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_STARTED_AT_EPOCH: ${{ steps.workflow_timer.outputs.started_at_epoch }}
        run: |
          set -euo pipefail

          build_status=success
          case "$CURRENT_JOB_STATUS" in
            failure|cancelled) build_status="$CURRENT_JOB_STATUS" ;;
          esac

          for outcome in \
            "$SEQUENCE_OUTCOME" \
            "$ANDROID_FIRST_OUTCOME" \
            "$IOS_FIRST_OUTCOME" \
            "$ANDROID_SECOND_OUTCOME" \
            "$IOS_SECOND_OUTCOME" \
            "$FIRST_STORE_UPLOAD_OUTCOME" \
            "$STORE_UPLOAD_CLEANUP_OUTCOME"; do
            case "$outcome" in
              failure|cancelled) build_status=failure ;;
            esac
          done

          case "$BUILD_PLATFORM" in
            Android) export BUILD_BUNDLE_NO="${ANDROID_BUNDLE_NO:-$REQUEST_BUNDLE_NO}" ;;
            iOS) export BUILD_BUNDLE_NO="${BUILD_IOS_EFFECTIVE_BUNDLE_NO:-$REQUEST_BUNDLE_NO}" ;;
            *) export BUILD_BUNDLE_NO="$REQUEST_BUNDLE_NO" ;;
          esac

          if [ "$build_status" = success ] && [ "$ANDROID_DEVELOPMENT_BUILD" = true ]; then
            if [ "$DIRECT_APK_DELIVERY_OUTCOME" = success ]; then
              echo "Slack success was delivered with the Development APK; skipping a duplicate webhook message."
              exit 0
            fi
            direct_delivery_phase=""
            if [ -r "$DIRECT_APK_DELIVERY_PHASE_PATH" ]; then
              direct_delivery_phase="$(sed -n '1p' "$DIRECT_APK_DELIVERY_PHASE_PATH")"
            fi
            case "$direct_delivery_phase" in
              completed|receipt-delivered)
                echo "Slack delivery receipt confirms success; skipping a contradictory failure webhook."
                exit 0
                ;;
              completion-attempted|completion-ambiguous|receipt-pending)
                echo "::warning::Slack completion is indeterminate; a durable pending receipt blocks duplicate APK delivery."
                echo "Reconcile or reset the pending receipt before retrying this GitHub run."
                exit 0
                ;;
            esac
            build_status=apk_delivery_failure
          fi

          export BUILD_JOB_STATUS="$build_status"
          bash "$REPOSITORY_ROOT/.github/scripts/notify-slack-build-result.sh"

      - name: Remove Slack delivery phase marker
        if: always()
        continue-on-error: true
        shell: bash
        run: rm -f "${RUNNER_TEMP:-/tmp}/buildcommit-slack-upload-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.phase"
